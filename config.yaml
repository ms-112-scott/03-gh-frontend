# ──────────────────────────────────────────────────────────────────────────────
# config.yaml — 03-gh-frontend
# ──────────────────────────────────────────────────────────────────────────────

# WebSocket 伺服器設定
ws_host: "localhost"
ws_port: 8765

# 計算與顯示解析度
data_res:  256       # NCA / Mask / SDF 計算解析度
gui_res:   512       # Taichi GUI 視窗大小
max_edges: 2000      # 最大多邊形邊數

# ── NCA / VAENCA 模型設定 ──────────────────────────────────────────────────────
#
# nca_checkpoint：指向訓練好的 .pth 檔案。
#   VAENCA  → .pth 中 config["VAENCA"] 存在，自動載入 VAENCA
#   舊版 LBM → .pth 中 config["Model"]  存在，自動載入 LBMInspiredNCA
#
# nca_cfd_src：02-nca-cfd/src 的絕對路徑。
#   null → 自動從 checkpoint 路徑向上推算（monorepo 標準結構）
#   手動設定範例：
#     nca_cfd_src: "C:/Users/GAI/Desktop/NCA_workspace/02-nca-cfd/src"
#
nca_checkpoint: "../../02-nca-cfd/train_log/Vae_Nca/vaenca_model_final_latest.pth"
nca_cfd_src:    null

# 每幀演化步數（越高流場越穩定，但 FPS 越低）
# VAENCA 使用 rollout(n_steps)，一次 encoder forward 涵蓋全部步數，效率高
nca_steps_per_frame: 4

# LBM 速度單位 → m/s 換算係數（影響 Beaufort 與速度顯示）
# 根據模型訓練時的物理縮尺設定
lbm_to_ms: 10.0

# 預設視覺化模式：velocity | vorticity | pressure | beaufort | stress
default_viz_mode: "velocity"
